<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 Tier DevOps App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>3 Tier DevOps Notes</h1>
    <p class="subtitle">Presentation tier served by Nginx, Java API tier on Spring Boot, and MySQL data tier.</p>

    <section class="card">
      <h2>Create Note</h2>
      <form id="noteForm">
        <label for="title">Title</label>
        <input id="title" name="title" maxlength="120" required>

        <label for="content">Content</label>
        <textarea id="content" name="content" maxlength="1000" rows="4" required></textarea>

        <button type="submit">Save</button>
      </form>
      <p id="status"></p>
    </section>

    <section class="card">
      <h2>Saved Notes</h2>
      <div id="notes"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
